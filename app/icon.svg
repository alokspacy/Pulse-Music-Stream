<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0c0b0e" />
      <stop offset="100%" stop-color="#181522" />
    </linearGradient>
    <!-- Accent Gradient for the bars -->
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#d946ef" />
      <stop offset="50%" stop-color="#a855f7" />
      <stop offset="100%" stop-color="#7e22ce" />
    </linearGradient>
  </defs>
  <!-- Background Circle -->
  <circle cx="50" cy="50" r="48" fill="url(#bgGrad)" />
  <!-- Outer Glow/Ring -->
  <circle cx="50" cy="50" r="42" fill="none" stroke="url(#accentGrad)" stroke-width="4" opacity="0.3" />
  <!-- Soundwave Bars in the center -->
  <rect x="25" y="35" width="6" height="30" rx="3" fill="url(#accentGrad)" />
  <rect x="37" y="20" width="6" height="60" rx="3" fill="url(#accentGrad)" />
  <rect x="49" y="10" width="6" height="80" rx="3" fill="url(#accentGrad)" />
  <rect x="61" y="25" width="6" height="50" rx="3" fill="url(#accentGrad)" />
  <rect x="73" y="40" width="6" height="20" rx="3" fill="url(#accentGrad)" />
</svg>
